---
name: terrascan

on:
  pull_request:
    branches: [main]

env:
  TEMPLATE_REPOSITORY: telekom-mms/terraform-template

jobs:
  call-terrascan:
    if: github.repository != '$TEMPLATE_REPOSITORY'
    uses: telekom-mms/.github/.github/workflows/terrascan.yml@779d4f2eff4bb547ba5620cf7c504bd8c16274a4 # main
    with:
      iac_type: terraform
      iac_dir: ./tests
      policy_type: all
      non_recursive: true
