---
name: terrascan

on:
  pull_request:
    branches: [main]

env:
  TEMPLATE_REPOSITORY: telekom-mms/terraform-template

jobs:
  call-terrascan:
    if: github.repository != '$TEMPLATE_REPOSITORY'
    uses: telekom-mms/.github/.github/workflows/terrascan.yml@60acb12b6297b155e35f43dfc575ff5d84f818dd # main
    with:
      iac_type: terraform
      iac_dir: ./tests
      policy_type: all
      non_recursive: true
